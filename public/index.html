<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQUISH</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; background:#111;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; font-family:'Nunito', sans-serif;
  }
  canvas {
    display:block; max-width:100vw; max-height:100vh;
    width:auto !important; height:auto !important;
    aspect-ratio:640/480; border-radius:20px;
    box-shadow: 0 0 0 3px #fff, 0 12px 48px rgba(0,0,0,0.7);
    transition: box-shadow 1.2s ease;
  }
  /* Canvas ring colour shifts with zone */
  body.zone-stillness   canvas { box-shadow: 0 0 0 3px #60a0ff, 0 12px 48px rgba(0,0,0,0.7); }
  body.zone-surge       canvas { box-shadow: 0 0 0 3px #ff5050, 0 12px 48px rgba(0,0,0,0.7); }
  body.zone-convergence canvas { box-shadow: 0 0 0 3px #c080ff, 0 12px 48px rgba(0,0,0,0.7); }
  body.zone-void        canvas { box-shadow: 0 0 0 3px #666,    0 12px 48px rgba(0,0,0,0.7); }

  /* Zone label — bottom centre, fades in/out */
  #zone-label {
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    font-family:'Nunito', sans-serif; font-size:11px; font-weight:800;
    letter-spacing:0.25em; text-transform:uppercase;
    color:rgba(255,255,255,0.7); text-align:center;
    pointer-events:none; white-space:nowrap;
    opacity:0; transition:opacity 1s ease;
  }
  #zone-label.show { opacity:1; }
  #zone-desc {
    display:block; font-size:9px; font-weight:400;
    letter-spacing:0.12em; opacity:0.5; margin-top:2px;
  }
</style>
</head>
<body>
<div id="zone-label"><span id="zn"></span><span id="zone-desc" id="zd"></span></div>
<script>
// ─────────────────────────────────────────────────────────────
//  SQUISH — psychogeographic field display
//
//  FOUR ZONES (classified by Ollama every 5s):
//  stillness   — low speed, blue palette, fist disabled
//  surge       — high speed, red palette, repel doubled
//  convergence — two hands close, purple palette
//  void        — no hands, gray palette, field drifts alone
//
//  Each zone changes:
//  1. Particle colour palette (hue target, smoothly lerped)
//  2. Force rules (zone-specific physics constraints)
//  3. Hand skeleton colour
//  4. Canvas ring colour (CSS)
//  5. Zone label shown at bottom of screen
// ─────────────────────────────────────────────────────────────

const W = 640, H = 480;

let handPose, video;
let hands = [];
let ready = false;

// ── Physics params (from controller) ─────────────────────────
let P = {
  count: 350, gravity: 0.02, friction: 0.993,
  radius: 110, attract: 3.5, repel: 7.0, size: 4, trail: true
};

// ── Zone state ────────────────────────────────────────────────
// Zone palettes: hue values for HSB colour mode
const ZONE_PALETTES = {
  stillness:   { hue: 210, sat: 70,  handCol: '#60a0ff', bg: 0   },
  surge:       { hue: 0,   sat: 85,  handCol: '#ff5050', bg: 5   },
  convergence: { hue: 270, sat: 75,  handCol: '#c080ff', bg: 2   },
  void:        { hue: 0,   sat: 0,   handCol: '#888888', bg: 0   }
};

let activeZone    = 'void';
let targetHue     = 0;
let targetSat     = 0;
let currentHue    = 0;
let currentSat    = 0;
let zoneHandCol   = '#888888';

// Zone force rules:
// stillness  — fist gesture disabled (open only)
// surge      — repel force x2, fist disabled
// convergence — normal forces, extra attract between palms
// void       — no hands, all forces normal
function zoneRepelMult()  { return activeZone === 'surge'     ? 2.2  : 1.0; }
function zoneFistAllowed(){ return activeZone !== 'stillness' && activeZone !== 'surge'; }

// ── Particles ─────────────────────────────────────────────────
let pts = [];

// ── Hand state ────────────────────────────────────────────────
let hs = [newHand(), newHand()];
let score = 0, best = 0;
let lastStateSend = 0;

function newHand() {
  return { on:false, kp:[], px:0,py:0, ppx:0,ppy:0, vx:0,vy:0, spd:0, g:'open', pg:'open', held:0, flickCd:0 };
}

// ── WebSocket ─────────────────────────────────────────────────
let ws;
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host);
  ws.onopen = () => ws.send(JSON.stringify({ type:'identify', role:'display' }));
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'params') {
      P = { ...P, ...msg.params };
      if (Math.abs(pts.length - P.count) > 30) spawnParticles();
    }
    if (msg.type === 'zone')  applyZone(msg);
    if (msg.type === 'reset') { spawnParticles(); best=0; score=0; }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}
connectWS();

// ── Apply zone ────────────────────────────────────────────────
let zoneLabelTimer;
function applyZone(msg) {
  activeZone  = msg.zone;
  const pal   = ZONE_PALETTES[activeZone] || ZONE_PALETTES.void;
  targetHue   = pal.hue;
  targetSat   = pal.sat;
  zoneHandCol = pal.handCol;

  // Shift CSS body class for canvas ring colour
  document.body.className = 'zone-' + activeZone;

  // Show zone label
  const zn = document.getElementById('zn');
  const zd = document.getElementById('zone-desc');
  const el = document.getElementById('zone-label');
  if (zn) zn.textContent = msg.label || activeZone;
  if (zd) zd.textContent = msg.description || '';
  el.classList.add('show');
  clearTimeout(zoneLabelTimer);
  zoneLabelTimer = setTimeout(() => el.classList.remove('show'), 4000);
}

// ── ml5 preload ───────────────────────────────────────────────
function preload() {
  handPose = ml5.handPose({ flipped:true, maxHands:2 });
}

function setup() {
  createCanvas(W, H);
  colorMode(HSB, 360, 100, 100, 255);
  video = createCapture(VIDEO);
  video.size(W, H);
  video.hide();
  handPose.detectStart(video, (r) => { hands=r; ready=true; });
  spawnParticles();
  textFont('monospace');
  noSmooth();
}

function spawnParticles() {
  pts = [];
  for (let i=0; i<P.count; i++) {
    pts.push({
      x: random(W), y: random(H),
      vx: random(-1.5,1.5), vy: random(-1.5,1.5),
      r: P.size * random(0.6,1.2),
      hueOffset: random(-20, 20)   // per-particle hue variance
    });
  }
}

// ── Gesture classifier ────────────────────────────────────────
function gesture(kp, spd) {
  if (!kp || kp.length < 21) return 'open';
  if (spd > 18) return 'flick';
  const up = (t,p) => kp[t].y < kp[p].y - 8;
  const dn = (t,m) => kp[t].y >= kp[m].y - 10;
  const iUp=up(8,6),mUp=up(12,10),rUp=up(16,14),pUp=up(20,18);
  const iDn=dn(8,5),mDn=dn(12,9), rDn=dn(16,13),pDn=dn(20,17);
  if (iDn&&mDn&&rDn&&pDn) return 'fist';
  if (iUp&&mUp&&rUp&&pUp) return abs(kp[8].x-kp[20].x)>60 ? 'spread' : 'open';
  return 'open';
}

// ── Update hands ──────────────────────────────────────────────
const SM = 0.4;
function updateHands() {
  for (const h of hs) { h.on=false; h.held=0; }
  for (let i=0; i<min(hands.length,2); i++) {
    const raw=hands[i];
    if (!raw||!raw.keypoints||raw.keypoints.length<21) continue;
    const h=hs[i]; h.ppx=h.px; h.ppy=h.py; h.on=true;
    if (h.kp.length<21) { h.kp=raw.keypoints.map(k=>({x:k.x,y:k.y})); }
    else { for (let k=0;k<21;k++) { h.kp[k].x=lerp(h.kp[k].x,raw.keypoints[k].x,SM); h.kp[k].y=lerp(h.kp[k].y,raw.keypoints[k].y,SM); } }
    h.px=(h.kp[0].x+h.kp[5].x+h.kp[9].x+h.kp[13].x+h.kp[17].x)/5;
    h.py=(h.kp[0].y+h.kp[5].y+h.kp[9].y+h.kp[13].y+h.kp[17].y)/5;
    h.vx=h.px-h.ppx; h.vy=h.py-h.ppy;
    h.spd=sqrt(h.vx*h.vx+h.vy*h.vy);
    h.pg=h.g;
    // Apply zone gesture constraint
    const raw_g = gesture(h.kp, h.spd);
    h.g = (raw_g==='fist' && !zoneFistAllowed()) ? 'open' : raw_g;
    if (h.g==='flick'&&h.pg!=='flick') h.flickCd=18;
    if (h.flickCd>0) h.flickCd--;
  }
}

// ── Apply forces ──────────────────────────────────────────────
function applyForces() {
  const R    = P.radius;
  const repM = zoneRepelMult();

  for (const h of hs) {
    if (!h.on) continue;
    let held = 0;
    for (const p of pts) {
      const dx=h.px-p.x, dy=h.py-p.y, d=sqrt(dx*dx+dy*dy);
      if (d>R*2.2||d<0.5) continue;
      const n=d/R;
      if (h.g==='fist') {
        const f=P.attract/(n*n+0.3);
        p.vx+=(dx/d)*f*0.10; p.vy+=(dy/d)*f*0.10;
        p.vx*=0.88; p.vy*=0.88;
        if (d<R*0.5) held++;
      } else if (h.g==='open') {
        if (d<R) { p.vx+=(dx/d)*0.8*(1-n)*0.07; p.vy+=(dy/d)*0.8*(1-n)*0.07; p.vx*=0.94; p.vy*=0.94; held++; }
      } else if (h.g==='spread') {
        const f=P.repel*repM*max(0,1-n);
        p.vx-=(dx/d)*f*0.18; p.vy-=(dy/d)*f*0.18;
      } else if (h.g==='flick'&&h.flickCd>0) {
        if (d<R*1.6) { p.vx+=h.vx*0.20; p.vy+=h.vy*0.20; }
      }
    }
    h.held = held;
  }

  // Convergence zone: extra gentle pull between two palms
  if (activeZone==='convergence' && hs[0].on && hs[1].on) {
    const dx=hs[1].px-hs[0].px, dy=hs[1].py-hs[0].py;
    const d=sqrt(dx*dx+dy*dy);
    if (d>10) {
      for (const p of pts) {
        const mx=(hs[0].px+hs[1].px)/2, my=(hs[0].py+hs[1].py)/2;
        const pdx=mx-p.x, pdy=my-p.y, pd=sqrt(pdx*pdx+pdy*pdy);
        if (pd < P.radius*1.5 && pd > 0.5) {
          p.vx += (pdx/pd)*0.04; p.vy += (pdy/pd)*0.04;
        }
      }
    }
  }
}

// ── Step particles ────────────────────────────────────────────
function stepPts() {
  for (const p of pts) {
    p.vy+=P.gravity; p.vx*=P.friction; p.vy*=P.friction;
    p.x+=p.vx; p.y+=p.vy;
    if (p.x<p.r)   { p.x=p.r;   p.vx*=-0.7; }
    if (p.x>W-p.r) { p.x=W-p.r; p.vx*=-0.7; }
    if (p.y<p.r)   { p.y=p.r;   p.vy*=-0.7; }
    if (p.y>H-p.r) { p.y=H-p.r; p.vy*=-0.7; }
  }
}

// ── Draw particles ────────────────────────────────────────────
// Smoothly lerp current hue/sat toward zone target
function drawPts() {
  currentHue = lerp(currentHue, targetHue, 0.03);
  currentSat = lerp(currentSat, targetSat, 0.03);

  noStroke();
  for (const p of pts) {
    const v   = sqrt(p.vx*p.vx+p.vy*p.vy);
    const bri = map(v, 0, 10, 55, 100);
    const sat = currentSat > 5 ? currentSat : 0;
    const hue = (currentHue + p.hueOffset + 360) % 360;
    fill(hue, sat, bri, 220);
    circle(p.x, p.y, p.r*2);
  }
}

// ── Draw hand skeleton ────────────────────────────────────────
const BONES=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];

function drawHand(h, col) {
  if (!h.on||h.kp.length<21) return;
  const sq=h.g==='fist', sp=h.g==='spread';
  const R=P.radius;
  stroke(col); noFill(); strokeWeight(sq?2.5:1);
  drawingContext.setLineDash(sq?[]:[4,7]);
  circle(h.px,h.py,R*2);
  drawingContext.setLineDash([]);
  if (sq) { fill(col+'18'); noStroke(); circle(h.px,h.py,R*2); }
  if (sp) { noFill(); stroke(col); strokeWeight(1); circle(h.px,h.py,R*3); strokeWeight(0.5); circle(h.px,h.py,R*4.2); }
  stroke(col); strokeWeight(sq?2:1.3); noFill();
  for (const [a,b] of BONES) line(h.kp[a].x,h.kp[a].y,h.kp[b].x,h.kp[b].y);
  noStroke(); fill(col);
  for (let k=0;k<21;k++) { const tip=[4,8,12,16,20].includes(k); circle(h.kp[k].x,h.kp[k].y,tip?(sq?12:8):5); }
  noStroke(); fill(col); textSize(10); textAlign(CENTER);
  text(h.g.toUpperCase(),h.kp[0].x,h.kp[0].y-14);
}

// ── HUD ───────────────────────────────────────────────────────
function pill(x,y,w,h,r) {
  beginShape();
  vertex(x+r,y); vertex(x+w-r,y);
  quadraticVertex(x+w,y,x+w,y+r);
  vertex(x+w,y+h-r);
  quadraticVertex(x+w,y+h,x+w-r,y+h);
  vertex(x+r,y+h);
  quadraticVertex(x,y+h,x,y+h-r);
  vertex(x,y+r);
  quadraticVertex(x,y,x+r,y);
  endShape(CLOSE);
}

function drawHUD() {
  const R=12;
  colorMode(RGB);

  // Score pill — top left
  noStroke(); fill(0,0,0,200); pill(8,8,120,64,R);
  stroke(255); strokeWeight(2); noFill(); pill(8,8,120,64,R);
  noStroke(); fill(255); textAlign(LEFT);
  textSize(9); text('HELD',18,26);
  textSize(34); text(score,18,60);
  noStroke(); fill(160); textSize(8); text('BEST '+best,18,78);

  // Hand badges — top right
  for (let i=0;i<2;i++) {
    const h=hs[i], bx=W-108+i*54;
    noStroke(); fill(0,0,0,200); pill(bx,8,48,52,R);
    stroke(h.on?255:50); strokeWeight(h.on?2:1); noFill(); pill(bx,8,48,52,R);
    noStroke(); fill(h.on?255:60);
    textSize(8); textAlign(CENTER);
    text('H'+(i+1),bx+24,22);
    text(h.on?h.g.toUpperCase():'--',bx+24,34);
    fill(180); textSize(8);
    text(h.on?h.held+'p':'',bx+24,48);
  }

  // Zone rule reminder — bottom left (only when zone is active)
  if (activeZone !== 'void') {
    const ruleText = {
      stillness:   'STILLNESS  hold still',
      surge:       'SURGE  scatter freely',
      convergence: 'CONVERGENCE  stay close'
    }[activeZone] || '';
    noStroke(); fill(0,0,0,180); pill(8,H-38,210,28,R);
    noStroke(); fill(200); textSize(8); textAlign(LEFT);
    text(ruleText, 18, H-20);
  }

  // Loading overlay
  if (!ready) {
    noStroke(); fill(0,0,0,210); rect(0,0,W,H);
    noStroke(); fill(0,0,0,200); pill(W/2-130,H/2-30,260,60,16);
    stroke(255); strokeWeight(2); noFill(); pill(W/2-130,H/2-30,260,60,16);
    noStroke(); fill(255); textSize(13); textAlign(CENTER);
    text('loading handpose...',W/2,H/2+2);
    fill(140); textSize(9); text('allow camera access',W/2,H/2+18);
  }

  colorMode(HSB, 360, 100, 100, 255);
}

// ── Send state ────────────────────────────────────────────────
function sendState() {
  if (!ws||ws.readyState!==WebSocket.OPEN) return;
  const now=millis();
  if (now-lastStateSend<500) return;
  lastStateSend=now;

  const activeHands=hs.filter(h=>h.on);
  const gestures=activeHands.map(h=>h.g);
  let totalSpd=0, nearHand=0;
  for (const p of pts) {
    totalSpd+=sqrt(p.vx*p.vx+p.vy*p.vy);
    for (const h of hs) {
      if (!h.on) continue;
      const dx=h.px-p.x, dy=h.py-p.y;
      if (sqrt(dx*dx+dy*dy)<P.radius) nearHand++;
    }
  }
  // Palm distance
  let palmDist=0;
  if (hs[0].on&&hs[1].on) {
    const dx=hs[1].px-hs[0].px, dy=hs[1].py-hs[0].py;
    palmDist=sqrt(dx*dx+dy*dy);
  }

  ws.send(JSON.stringify({ type:'state', state:{
    hands:   activeHands.length,
    gestures,
    score, best,
    avgSpeed: pts.length ? totalSpd/pts.length : 0,
    palmDist: palmDist,
    density:  pts.length ? nearHand/pts.length : 0
  }}));
}

// ── Draw ──────────────────────────────────────────────────────
function draw() {
  if (P.trail) { noStroke(); fill(0,0,0,45); rect(0,0,W,H); }
  else         background(0);

  updateHands();
  applyForces();
  stepPts();
  drawPts();

  drawHand(hs[0], zoneHandCol);
  drawHand(hs[1], zoneHandCol === '#60a0ff' ? '#4080cc' : zoneHandCol);

  score=hs[0].held+hs[1].held;
  best=max(best,score);

  drawHUD();
  sendState();
}
</script>
</body>
</html>
