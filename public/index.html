<script>
// ─────────────────────────────────────────────────────────────
//  SQUISH — combo system + emoji tutorial + heuristic zones
//  No Ollama. Zone classification is pure heuristic.
//
//  COMBO SYSTEM (Option 3):
//  When both hands are detected, their gestures are checked
//  against a combo table every frame. A matched combo fires
//  a named event with a specific physics effect and a brief
//  pixel-text flash on screen.
//
//  COMBOS:
//  fist   + fist   = SINGULARITY  all particles rush to midpoint
//  fist   + spread = COLLISION    one cluster explodes through the other
//  open   + open   = ORBIT        particles form a stable ring between palms
//  fist   + open   = FEED         particles flow from open hand to fist
//  spread + spread = NOVA         max scatter + surge zone
//  flick  + fist   = CATCH        flicked particles lock into fist cluster
//  pull   + pull   = TETHER       two gravity wells stream particles between them
// ─────────────────────────────────────────────────────────────

const W = 640, H = 480;
let handPose, video, ready = false;
let hands = [];

// Physics params
let P = { count:200, gravity:0.02, friction:0.993, radius:110, attract:3.5, repel:7.0, size:4, trail:true };

// Zone state — heuristic, no Ollama
const ZONE_RGB = {
  stillness:   { r:140, g:190, b:240, hand:'#7ab4e8', label:'STILLNESS', desc:'hold still' },
  surge:       { r:240, g:130, b:110, hand:'#e8786a', label:'SURGE',     desc:'scatter freely' },
  convergence: { r:190, g:150, b:235, hand:'#c09ae8', label:'CONVERGE',  desc:'stay close' },
  void:        { r:160, g:155, b:175, hand:'#a09ab0', label:'VOID',      desc:'field at rest' }
};
let activeZone = 'void', zoneHandCol = '#a09ab0';
let curR=160, curG=155, curB=175, flashAlpha=0;
let lastZoneChange = 0;

// Particles
let px,py,pvx,pvy,pr,pw, N=0;

// Hand state
let hs = [newHand(), newHand()];
let score=0, best=0, lastStateSend=0;

// ── COMBO SYSTEM ──────────────────────────────────────────────
// comboActive: name of currently held combo (or '')
// comboFrames: how long current combo has been held
// comboEvent:  fired combo waiting to play its effect
// comboEventTimer: countdown for visual flash

let comboActive   = '';
let comboFrames   = 0;
let comboFlash    = { name:'', timer:0, col:[255,255,255] };
const COMBO_HOLD  = 18; // frames both hands must hold before firing

// Canonical combo table. Key is sorted pair e.g. 'fist+open'
const COMBOS = {
  'fist+fist':    { name:'SINGULARITY', col:[255,200,80],  desc:'particles converge' },
  'fist+spread':  { name:'COLLISION',   col:[255,100,80],  desc:'clusters collide'   },
  'open+open':    { name:'ORBIT',       col:[100,200,255], desc:'stable orbit forms' },
  'fist+open':    { name:'FEED',        col:[180,255,140], desc:'energy transfers'   },
  'spread+spread':{ name:'NOVA',        col:[255,80,120],  desc:'full scatter burst' },
  'flick+fist':   { name:'CATCH',       col:[200,160,255], desc:'particles locked'   },
  'pull+pull':    { name:'TETHER',      col:[120,255,200], desc:'stream between hands'},
};

// Discovered combos (for legend unlock)
let discoveredCombos = new Set();

function comboKey(g1, g2) {
  // Sort so fist+open == open+fist
  const pair = [g1, g2].sort();
  return pair[0] + '+' + pair[1];
}

function checkCombos() {
  if (!hs[0].on || !hs[1].on) { comboActive = ''; comboFrames = 0; return; }

  const g0 = hs[0].g === 'flick' ? 'flick' : hs[0].g;
  const g1 = hs[1].g === 'flick' ? 'flick' : hs[1].g;
  const key = comboKey(g0, g1);
  const combo = COMBOS[key];
  if (!combo) { comboActive = ''; comboFrames = 0; return; }

  if (comboActive === key) {
    comboFrames++;
    if (comboFrames === COMBO_HOLD) {
      fireCombo(key, combo);
    }
  } else {
    comboActive = key;
    comboFrames = 0;
  }
}

function fireCombo(key, combo) {
  comboFlash = { name: combo.name, timer: 90, col: combo.col, desc: combo.desc };
  discoveredCombos.add(key);

  const mx = (hs[0].px + hs[1].px) * 0.5;
  const my = (hs[0].py + hs[1].py) * 0.5;

  if (key === 'fist+fist') {
    // SINGULARITY: everything rushes to midpoint
    flashAlpha = 30;
    for (let i=0; i<N; i++) {
      const dx = mx-px[i], dy = my-py[i];
      const d = Math.sqrt(dx*dx+dy*dy) + 0.1;
      pvx[i] += (dx/d) * 4.0;
      pvy[i] += (dy/d) * 4.0;
    }

  } else if (key === 'fist+spread') {
    // COLLISION: each hand's cluster explodes through the other
    for (let i=0; i<N; i++) {
      const dx0 = hs[0].px-px[i], dy0 = hs[0].py-py[i];
      const dx1 = hs[1].px-px[i], dy1 = hs[1].py-py[i];
      const d0 = Math.sqrt(dx0*dx0+dy0*dy0)+0.1;
      const d1 = Math.sqrt(dx1*dx1+dy1*dy1)+0.1;
      if (d0 < P.radius*1.5) { pvx[i] += (dx0/d0)*3; pvy[i] += (dy0/d0)*3; }
      if (d1 < P.radius*1.5) { pvx[i] -= (dx1/d1)*4; pvy[i] -= (dy1/d1)*4; }
    }
    flashAlpha = 25;

  } else if (key === 'open+open') {
    // ORBIT: pull particles to midpoint, add tangential velocity for ring
    for (let i=0; i<N; i++) {
      const dx = mx-px[i], dy = my-py[i];
      const d = Math.sqrt(dx*dx+dy*dy) + 0.1;
      if (d < P.radius*2) {
        pvx[i] += (dx/d) * 1.5;
        pvy[i] += (dy/d) * 1.5;
        pvx[i] += (-dy/d) * 1.2;
        pvy[i] += ( dx/d) * 1.2;
      }
    }

  } else if (key === 'fist+open') {
    // FEED: find which hand is fist and which is open, flow toward fist
    const fistH = hs[0].g==='fist' ? hs[0] : hs[1];
    const openH = hs[0].g==='open' ? hs[0] : hs[1];
    for (let i=0; i<N; i++) {
      const dx = openH.px-px[i], dy = openH.py-py[i];
      const d = Math.sqrt(dx*dx+dy*dy)+0.1;
      if (d < P.radius*1.8) {
        const fx = fistH.px-px[i], fy = fistH.py-py[i];
        const fd = Math.sqrt(fx*fx+fy*fy)+0.1;
        pvx[i] += (fx/fd) * 2.5;
        pvy[i] += (fy/fd) * 2.5;
        pvx[i] *= 0.85; pvy[i] *= 0.85;
      }
    }

  } else if (key === 'spread+spread') {
    // NOVA: maximum scatter from midpoint + force surge zone (no full flash)
    flashAlpha = 30;
    for (let i=0; i<N; i++) {
      const dx = px[i]-mx, dy = py[i]-my;
      const d = Math.sqrt(dx*dx+dy*dy) + 0.1;
      pvx[i] += (dx/d) * 8.0;
      pvy[i] += (dy/d) * 8.0;
    }
    setZone('surge');
    setTimeout(() => setZone('void'), 3000);

  } else if (key === 'flick+fist') {
    // CATCH: lock fast-moving particles near the fist
    const fistH = hs[0].g==='fist' ? hs[0] : hs[1];
    for (let i=0; i<N; i++) {
      const spd = Math.abs(pvx[i]) + Math.abs(pvy[i]);
      if (spd > 3) {
        const dx = fistH.px-px[i], dy = fistH.py-py[i];
        const d = Math.sqrt(dx*dx+dy*dy)+0.1;
        if (d < P.radius*2) {
          pvx[i] = (dx/d) * 0.5;
          pvy[i] = (dy/d) * 0.5;
        }
      }
    }

  } else if (key === 'pull+pull') {
    // TETHER: particles stream from each hand toward the other hand
    // Creates a flowing river of particles between the two palms
    for (let i=0; i<N; i++) {
      const dx0 = hs[0].px-px[i], dy0 = hs[0].py-py[i];
      const dx1 = hs[1].px-px[i], dy1 = hs[1].py-py[i];
      const d0 = Math.sqrt(dx0*dx0+dy0*dy0)+0.1;
      const d1 = Math.sqrt(dx1*dx1+dy1*dy1)+0.1;
      // Particles near hand 0 get pulled toward hand 1
      if (d0 < P.radius*1.6) {
        pvx[i] += (dx1/d1) * 3.5;
        pvy[i] += (dy1/d1) * 3.5;
        pvx[i] *= 0.90; pvy[i] *= 0.90;
      }
      // Particles near hand 1 get pulled toward hand 0
      if (d1 < P.radius*1.6) {
        pvx[i] += (dx0/d0) * 3.5;
        pvy[i] += (dy0/d0) * 3.5;
        pvx[i] *= 0.90; pvy[i] *= 0.90;
      }
    }
  }

  // Reset so combo needs to be re-held
  comboFrames = 0;
}

// ── HEURISTIC ZONE CLASSIFICATION ────────────────────────────
// Runs every 120 frames (~2s). No Ollama needed.
function classifyZone() {
  const h0on = hs[0].on, h1on = hs[1].on;
  if (!h0on && !h1on) { setZone('void'); return; }

  let totalSpd = 0;
  for (let i=0; i<N; i++) totalSpd += Math.abs(pvx[i]) + Math.abs(pvy[i]);
  const avgSpd = N ? (totalSpd/N) * 2.5 : 0;

  // Convergence: two hands with matched gestures in range
  if (h0on && h1on) {
    const dx = hs[1].px-hs[0].px, dy = hs[1].py-hs[0].py;
    const palmDist = Math.sqrt(dx*dx+dy*dy);
    if (palmDist < 220 && hs[0].g === hs[1].g) { setZone('convergence'); return; }
  }
  if (avgSpd > 4.5) { setZone('surge'); return; }
  if (avgSpd < 2.0) { setZone('stillness'); return; }
  setZone('void');
}

function setZone(zoneName) {
  if (zoneName === activeZone) return;
  activeZone = zoneName;
  zoneHandCol = ZONE_RGB[zoneName]?.hand || '#a09ab0';
  flashAlpha = 25; // kept low to avoid photosensitivity risk
  document.body.className = 'zone-' + zoneName;
  const z = ZONE_RGB[zoneName];
  const znEl = document.getElementById('zn');
  const zdEl = document.getElementById('zone-desc');
  const lbEl = document.getElementById('zone-label');
  if (znEl) znEl.textContent = z.label;
  if (zdEl) zdEl.textContent = z.desc;
  lbEl.classList.add('show');
  clearTimeout(lastZoneChange);
  lastZoneChange = setTimeout(() => lbEl.classList.remove('show'), 3500);
}

// ── TUTORIAL ──────────────────────────────────────────────────
// Emoji-based cards. Each card shows a large emoji glyph (80px),
// readable at any screen size, no pixel sprite drawing needed.

let tutorialActive = true;
let tutorialCard   = 0;
let tutorialTimer  = 0;
let lastHandSeen   = -9999;
const TUTORIAL_DELAY    = 180;
const TUTORIAL_CARD_DUR = 160;

// Extra cards: combo hints shown after base 4
const TUTORIAL_CARDS = [
  {
    name:   'SQUEEZE',
    sub:    'FIST',
    emoji:  '\u270A',   // raised fist
    desc:   'CURL ALL\nFINGERS INTO A FIST',
    effect: 'PULLS PARTICLES\nTOWARD YOUR PALM',
    col:    [232,180,120]
  },
  {
    name:   'HOLD',
    sub:    'OPEN PALM',
    emoji:  '\uD83D\uDD90',  // raised hand with fingers splayed
    desc:   'OPEN PALM\nFACING SCREEN',
    effect: 'PARTICLES ORBIT\nYOUR HAND',
    col:    [140,200,240]
  },
  {
    name:   'REPEL',
    sub:    'SPREAD',
    emoji:  '\uD83D\uDD96',  // vulcan salute / wide spread
    desc:   'SPLAY FINGERS\nAS WIDE AS POSSIBLE',
    effect: 'EXPLODES PARTICLES\nOUTWARD',
    col:    [240,130,110]
  },
  {
    name:   'FLICK',
    sub:    'FAST SWIPE',
    emoji:  '\uD83D\uDCA8',  // dash/wind symbol
    desc:   'SWIPE YOUR HAND\nQUICKLY ACROSS',
    effect: 'SENDS A SHOCKWAVE\nTHROUGH THE FIELD',
    col:    [190,150,235]
  },
  {
    name:   'PULL',
    sub:    'TWO FINGERS',
    emoji:  '\u270C\uFE0F',  // victory/peace sign — index + middle up
    desc:   'INDEX + MIDDLE\nFINGERS UP\nOTHERS CURLED',
    effect: 'STRONG DIRECTED\nGRAVITY WELL',
    col:    [120,255,200]
  },
  {
    name:   'COMBOS',
    sub:    'TWO HANDS',
    emoji:  '\u2728',   // sparkles
    desc:   'TRY BOTH HANDS\nAT ONCE',
    effect: 'SPECIAL EVENTS\nUNLOCK TOGETHER',
    col:    [255,220,100],
    isComboHint: true
  }
];

// ── WebSocket ─────────────────────────────────────────────────
let ws;
function connectWS(){
  const proto = location.protocol==='https:'?'wss:':'ws:';
  ws = new WebSocket(proto+'//'+location.host);
  ws.onopen = () => ws.send(JSON.stringify({type:'identify',role:'display'}));
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type==='params') {
      const old = P.count; P = {...P,...msg.params};
      if (Math.abs(old-P.count)>30) spawnParticles();
    }
    if (msg.type==='reset') { spawnParticles(); best=0; score=0; }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}
connectWS();

function newHand(){
  return {on:false,kp:[],px:0,py:0,ppx:0,ppy:0,vx:0,vy:0,spd:0,g:'open',pg:'open',held:0,flickCd:0};
}

function spawnParticles(){
  N = P.count;
  px=new Float32Array(N); py=new Float32Array(N);
  pvx=new Float32Array(N); pvy=new Float32Array(N);
  pr=new Float32Array(N); pw=new Float32Array(N);
  for(let i=0;i<N;i++){
    px[i]=random(W); py[i]=random(H);
    pvx[i]=random(-1.5,1.5); pvy[i]=random(-1.5,1.5);
    pr[i]=P.size*random(0.7,1.3); pw[i]=random(TWO_PI);
  }
}

// ── ml5 ───────────────────────────────────────────────────────
function preload(){ handPose = ml5.handPose({flipped:true,maxHands:2}); }

function setup(){
  const cnv = createCanvas(W,H);
  cnv.parent(document.querySelector('.canvas-wrap'));
  colorMode(RGB,255);
  video = createCapture(VIDEO);
  video.size(W,H); video.hide();
  handPose.detectStart(video,(r)=>{hands=r;ready=true;});
  spawnParticles();
  textFont('monospace');
  noSmooth();
}

// ── Gesture classifier ────────────────────────────────────────
function gesture(kp,spd){
  if(!kp||kp.length<21) return 'open';
  if(spd>18) return 'flick';
  const up=(t,p)=>kp[t].y<kp[p].y-8;
  const dn=(t,m)=>kp[t].y>=kp[m].y-10;
  const iUp=up(8,6),mUp=up(12,10),rUp=up(16,14),pUp=up(20,18);
  const iDn=dn(8,5),mDn=dn(12,9),rDn=dn(16,13),pDn=dn(20,17);
  if(iDn&&mDn&&rDn&&pDn) return 'fist';
  if(iUp&&mUp&&rUp&&pUp) return abs(kp[8].x-kp[20].x)>60?'spread':'open';
  // PULL: index + middle up, ring + pinky curled — two-finger point
  if(iUp&&mUp&&rDn&&pDn) return 'pull';
  return 'open';
}

const SM=0.4;
function updateHands(){
  for(const h of hs){h.on=false;h.held=0;}
  for(let i=0;i<min(hands.length,2);i++){
    const raw=hands[i];
    if(!raw||!raw.keypoints||raw.keypoints.length<21) continue;
    const h=hs[i]; h.ppx=h.px; h.ppy=h.py; h.on=true;
    if(h.kp.length<21){h.kp=raw.keypoints.map(k=>({x:k.x,y:k.y}));}
    else{for(let k=0;k<21;k++){h.kp[k].x=lerp(h.kp[k].x,raw.keypoints[k].x,SM);h.kp[k].y=lerp(h.kp[k].y,raw.keypoints[k].y,SM);}}
    h.px=(h.kp[0].x+h.kp[5].x+h.kp[9].x+h.kp[13].x+h.kp[17].x)/5;
    h.py=(h.kp[0].y+h.kp[5].y+h.kp[9].y+h.kp[13].y+h.kp[17].y)/5;
    h.vx=h.px-h.ppx; h.vy=h.py-h.ppy;
    h.spd=sqrt(h.vx*h.vx+h.vy*h.vy);
    h.pg=h.g;
    h.g=gesture(h.kp,h.spd);
    if(h.g==='flick'&&h.pg!=='flick') h.flickCd=18;
    if(h.flickCd>0) h.flickCd--;
  }
}

function zoneRepelMult()  { return activeZone==='surge'?2.2:1.0; }
function zoneFistAllowed(){ return activeZone!=='stillness'&&activeZone!=='surge'; }

function applyForces(){
  const R=P.radius, R2=R*R, R22sq=(R*2.2)*(R*2.2);
  const repM=zoneRepelMult();
  for(let hi=0;hi<2;hi++){
    const h=hs[hi]; if(!h.on) continue;
    let held=0;
    const hpx=h.px, hpy=h.py;
    const gact = (h.g==='fist'&&!zoneFistAllowed()) ? 'open' : h.g;
    for(let i=0;i<N;i++){
      const dx=hpx-px[i], dy=hpy-py[i], dsq=dx*dx+dy*dy;
      if(dsq>R22sq||dsq<0.25) continue;
      const d=sqrt(dsq), inv=1/d, n=d/R;
      if(gact==='fist'){
        const f=P.attract/(n*n+0.3);
        pvx[i]+=dx*inv*f*0.10; pvy[i]+=dy*inv*f*0.10;
        pvx[i]*=0.88; pvy[i]*=0.88;
        if(dsq<R2*0.25) held++;
      } else if(gact==='open'){
        if(dsq<R2){pvx[i]+=dx*inv*0.8*(1-n)*0.07;pvy[i]+=dy*inv*0.8*(1-n)*0.07;pvx[i]*=0.94;pvy[i]*=0.94;held++;}
      } else if(gact==='spread'){
        const f=P.repel*repM*max(0,1-n);
        pvx[i]-=dx*inv*f*0.18;pvy[i]-=dy*inv*f*0.18;
      } else if(gact==='pull'){
        // PULL: directional gravity well — stronger attraction, narrower cone
        // Particles stream in from the direction the fingers point (upward)
        if(dsq<R2){
          const f=P.attract*0.9/(n*n+0.4);
          pvx[i]+=dx*inv*f*0.09;
          pvy[i]+=dy*inv*f*0.09;
          pvx[i]*=0.91; pvy[i]*=0.91;
          held++;
        }
      } else if(gact==='flick'&&h.flickCd>0){
        if(dsq<R2*2.56){pvx[i]+=h.vx*0.20;pvy[i]+=h.vy*0.20;}
      }
    }
    h.held=held;
  }
  // Convergence: mid-point pull
  if(activeZone==='convergence'&&hs[0].on&&hs[1].on){
    const mx=(hs[0].px+hs[1].px)*.5, my=(hs[0].py+hs[1].py)*.5;
    const lim2=(P.radius*1.5)*(P.radius*1.5);
    for(let i=0;i<N;i++){
      const dx=mx-px[i],dy=my-py[i];
      if(dx*dx+dy*dy<lim2){const d=sqrt(dx*dx+dy*dy)+0.01;pvx[i]+=dx/d*0.04;pvy[i]+=dy/d*0.04;}
    }
  }
  // Void: slow centring pull
  if(activeZone==='void'){
    for(let i=0;i<N;i++){pvx[i]+=(W*.5-px[i])*0.0006;pvy[i]+=(H*.5-py[i])*0.0006;}
  }
}

function stepPts(){
  const T=frameCount;
  for(let i=0;i<N;i++){
    pvy[i]+=P.gravity; pvx[i]*=P.friction; pvy[i]*=P.friction;
    pvx[i]+=sin(T*0.04+pw[i])*0.012;
    pvy[i]+=cos(T*0.03+pw[i]*1.3)*0.010;
    px[i]+=pvx[i]; py[i]+=pvy[i];
    if(px[i]<pr[i]){px[i]=pr[i];pvx[i]*=-0.7;}
    if(px[i]>W-pr[i]){px[i]=W-pr[i];pvx[i]*=-0.7;}
    if(py[i]<pr[i]){py[i]=pr[i];pvy[i]*=-0.7;}
    if(py[i]>H-pr[i]){py[i]=H-pr[i];pvy[i]*=-0.7;}
  }
}

function drawPts(){
  const tgt=ZONE_RGB[activeZone]||ZONE_RGB.void;
  curR=lerp(curR,tgt.r,0.04);
  curG=lerp(curG,tgt.g,0.04);
  curB=lerp(curB,tgt.b,0.04);
  noStroke();
  for(let i=0;i<N;i++){
    const v=abs(pvx[i])+abs(pvy[i]);
    const bri=min(v*14+90,255);
    const sz=max(2,int(pr[i]*(1+v*0.04)));
    fill(int(curR*bri/255+25),int(curG*bri/255+25),int(curB*bri/255+25),230);
    rect(int(px[i]-sz/2),int(py[i]-sz/2),sz,sz);
  }
}

const BONES=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}

function drawHand(h,col){
  if(!h.on||h.kp.length<21) return;
  const sq=h.g==='fist', sp=h.g==='spread';
  const R=P.radius; const{r,g,b}=hexToRgb(col);
  noFill(); stroke(r,g,b,sq?200:100); strokeWeight(sq?3:2);
  drawingContext.setLineDash(sq?[]:[6,6]);
  rect(h.px-R,h.py-R,R*2,R*2);
  drawingContext.setLineDash([]);
  if(sq){fill(r,g,b,28);noStroke();rect(h.px-R,h.py-R,R*2,R*2);}
  if(sp){noFill();stroke(r,g,b,80);strokeWeight(1);rect(h.px-R*1.5,h.py-R*1.5,R*3,R*3);stroke(r,g,b,40);rect(h.px-R*2,h.py-R*2,R*4,R*4);}
  stroke(r,g,b,160);strokeWeight(1);noFill();
  for(const[a,b2]of BONES) line(int(h.kp[a].x),int(h.kp[a].y),int(h.kp[b2].x),int(h.kp[b2].y));
  noStroke();fill(r,g,b,220);
  const T=frameCount;
  for(let k=0;k<21;k++){
    const tip=[4,8,12,16,20].includes(k);
    const sz=tip?(sq?int(5+sin(T*0.25)*2):5):3;
    rect(int(h.kp[k].x-sz/2),int(h.kp[k].y-sz/2),sz,sz);
  }
  noStroke();fill(r,g,b,200);textSize(9);textAlign(CENTER);
  text(h.g.toUpperCase(),int(h.px),int(h.py)-R-8);
}

function drawConvergenceLine(){
  if(activeZone!=='convergence'||!hs[0].on||!hs[1].on) return;
  const{r,g,b}=hexToRgb(zoneHandCol);
  const d=sqrt((hs[1].px-hs[0].px)**2+(hs[1].py-hs[0].py)**2);
  if(d>300) return;
  const alpha=map(d,220,10,30,130);
  stroke(r,g,b,alpha);strokeWeight(1);
  drawingContext.setLineDash([4,4]);
  line(int(hs[0].px),int(hs[0].py),int(hs[1].px),int(hs[1].py));
  drawingContext.setLineDash([]);
  noStroke();
}

// ── COMBO CHARGE BAR ──────────────────────────────────────────
// When a combo is being held, draw a small charge bar at the top
function drawComboCharge(){
  if(!comboActive||comboFrames<=0) return;
  const combo = COMBOS[comboActive];
  if(!combo) return;
  const prog = comboFrames / COMBO_HOLD;
  const [cr,cg,cb] = combo.col;
  const bw=200, bh=8, bx=W/2-bw/2, by=8;
  noStroke(); fill(30,20,50,200); rect(bx-2,by-2,bw+4,bh+4);
  fill(cr,cg,cb,200); rect(bx,by,int(bw*prog),bh);
  noFill(); stroke(cr,cg,cb,100); strokeWeight(1); rect(bx,by,bw,bh);
  noStroke(); fill(cr,cg,cb,180); textSize(6); textAlign(CENTER);
  text(combo.name, W/2, by+bh+12);
}

// ── COMBO FLASH ───────────────────────────────────────────────
function drawComboFlash(){
  if(comboFlash.timer <= 0) return;
  comboFlash.timer--;
  const t = comboFlash.timer;
  const [cr,cg,cb] = comboFlash.col;
  // Fade based on timer: full opacity for first 30 frames, then fade out
  const alpha = t > 60 ? 255 : map(t, 0, 60, 0, 255);

  // NO full-canvas tint — just text overlay to avoid photosensitivity risk

  // Big combo name centred
  noStroke();
  fill(cr, cg, cb, alpha);
  textSize(22);
  textAlign(CENTER);
  text(comboFlash.name, W/2, H/2 - 14);

  fill(255, 255, 255, alpha * 0.55);
  textSize(7);
  text(comboFlash.desc, W/2, H/2 + 6);
}

// ── PIXEL BOX + HUD ───────────────────────────────────────────
const AMBER=[232,213,163], DARK=[26,16,37];

function pixelBox(x,y,w,h,borderCol,fillCol){
  noStroke();fill(13,8,32,200);rect(x+3,y+3,w,h);
  fill(fillCol[0],fillCol[1],fillCol[2],fillCol[3]||220);rect(x,y,w,h);
  noFill();stroke(borderCol[0],borderCol[1],borderCol[2]);strokeWeight(2);rect(x,y,w,h);
  stroke(borderCol[0],borderCol[1],borderCol[2],80);strokeWeight(1);
  line(x+2,y+2,x+w-2,y+2); line(x+2,y+2,x+2,y+h-2); noStroke();
}

function drawHUD(){
  // Score — top left
  pixelBox(8,8,112,66,AMBER,DARK);
  fill(AMBER[0],AMBER[1],AMBER[2]);textAlign(LEFT);
  textSize(6);text('HELD',14,22);
  textSize(22);text(score,14,52);
  fill(160,140,100);textSize(6);text('BEST:'+best,14,68);

  // Hand badges — top right
  for(let i=0;i<2;i++){
    const h=hs[i], bx=W-102+i*52;
    const bc=h.on?AMBER:[80,75,90];
    pixelBox(bx,8,48,50,bc,DARK);
    fill(bc[0],bc[1],bc[2]);textSize(6);textAlign(CENTER);
    text('H'+(i+1),bx+24,22);
    textSize(6);text(h.on?h.g.slice(0,5).toUpperCase():'----',bx+24,34);
    fill(140,130,100);textSize(6);text(h.on?h.held+'p':'',bx+24,46);
  }

  // Zone rule — bottom left (only when active zones)
  const ruleText={stillness:'HOLD STILL',surge:'SCATTER!',convergence:'STAY CLOSE'}[activeZone]||'';
  if(ruleText){
    pixelBox(8,H-32,120,24,AMBER,DARK);
    fill(AMBER[0],AMBER[1],AMBER[2]);textSize(6);textAlign(LEFT);
    text(ruleText,16,H-16);
  }

  // Discovered combos — bottom right, small
  const disc = [...discoveredCombos];
  if(disc.length > 0){
    const bh2 = 12 + disc.length * 12;
    pixelBox(W-130,H-bh2-8,122,bh2,AMBER,DARK);
    fill(AMBER[0],AMBER[1],AMBER[2]);textSize(5);textAlign(LEFT);
    text('COMBOS FOUND:',W-124,H-bh2);
    disc.forEach((k,i)=>{
      const c = COMBOS[k];
      fill(c.col[0],c.col[1],c.col[2]);
      text(c.name,W-124,H-bh2+14+i*12);
    });
  } else {
    // Show gesture guide when no combos found yet
    pixelBox(W-116,H-70,108,62,AMBER,DARK);
    fill(AMBER[0],AMBER[1],AMBER[2]);textSize(5);textAlign(LEFT);
    text('\u270A  SQUEEZE',W-110,H-56);
    text('\uD83D\uDD90  HOLD',   W-110,H-44);
    text('\uD83D\uDD96  REPEL',  W-110,H-32);
    text('\u270C  PULL',   W-110,H-20);
  }

  // Field at rest label when void
  if(activeZone==='void'&&(hs[0].on||hs[1].on)===false){
    pixelBox(W/2-72,H/2-14,144,28,AMBER,DARK);
    fill(AMBER[0],AMBER[1],AMBER[2]);textSize(6);textAlign(CENTER);
    text('FIELD AT REST',W/2,H/2+4);
  }

  // Loading overlay
  if(!ready){
    noStroke();fill(13,8,32,220);rect(0,0,W,H);
    pixelBox(W/2-140,H/2-36,280,72,AMBER,DARK);
    fill(AMBER[0],AMBER[1],AMBER[2]);textSize(8);textAlign(CENTER);
    text('LOADING...',W/2,H/2-8);
    fill(160,140,100);textSize(6);text('ALLOW CAMERA ACCESS',W/2,H/2+12);
    if(int(frameCount/20)%2===0){fill(AMBER[0],AMBER[1],AMBER[2]);rect(W/2+66,H/2+4,8,8);}
  }
}

// ── TUTORIAL — emoji-based cards ─────────────────────────────
function drawTutorial(){
  const T = frameCount;
  const card = TUTORIAL_CARDS[tutorialCard];
  const [cr,cg,cb] = card.col;

  noStroke();fill(13,8,32,210);rect(0,0,W,H);

  // Title bar
  pixelBox(W/2-160,18,320,28,AMBER,DARK);
  fill(AMBER[0],AMBER[1],AMBER[2]);textSize(8);textAlign(CENTER);
  text('SQUISH  HOW TO PLAY',W/2,36);

  // Progress dots (5 cards now)
  for(let d=0;d<TUTORIAL_CARDS.length;d++){
    const dx=W/2-30+d*12, dy=56; noStroke();
    fill(d===tutorialCard?AMBER[0]:80, d===tutorialCard?AMBER[1]:70, d===tutorialCard?AMBER[2]:60);
    rect(dx,dy,8,8);
  }

  // Card box
  const bx=W/2-170, by=72, bw=340, bh=300;
  pixelBox(bx,by,bw,bh,[cr,cg,cb],DARK);

  // Gesture name
  fill(cr,cg,cb);textSize(13);textAlign(CENTER);
  text(card.name,W/2,by+26);
  fill(cr,cg,cb,150);textSize(7);
  text('( '+card.sub+' )',W/2,by+42);

  // Divider
  stroke(cr,cg,cb,50);strokeWeight(1);
  line(bx+16,by+52,bx+bw-16,by+52);noStroke();

  // ── EMOJI — drawn via drawingContext, 80px, always legible ──
  push();
  drawingContext.font = '80px serif';
  drawingContext.textAlign = 'center';
  drawingContext.textBaseline = 'middle';
  // Slight bounce animation
  const bounce = sin(T * 0.08) * 5;
  drawingContext.fillText(card.emoji, W/2, by + 130 + bounce);
  pop();

  // How-to text
  const descLines = card.desc.split('\n');
  fill(AMBER[0],AMBER[1],AMBER[2]);textSize(7);textAlign(CENTER);
  descLines.forEach((l,i)=>text(l,W/2,by+190+i*16));

  // Effect divider
  stroke(cr,cg,cb,45);strokeWeight(1);
  line(bx+40,by+216,bx+bw-40,by+216);noStroke();

  // Effect text
  fill(cr,cg,cb,200);textSize(6);textAlign(CENTER);
  const effLines = card.effect.split('\n');
  effLines.forEach((l,i)=>text(l,W/2,by+230+i*13));

  // If combo hint card, show a few examples
  if(card.isComboHint){
    fill(255,220,100,160);textSize(5);
    text('\u270A + \u270A  =  SINGULARITY',W/2,by+252);
    text('\uD83D\uDD90 + \uD83D\uDD90  =  ORBIT',W/2,by+264);
    text('\u270C + \u270C  =  TETHER',W/2,by+276);
  }

  // Progress bar
  const prog = min((T-tutorialTimer)/TUTORIAL_CARD_DUR,1);
  const barX=bx+16, barY=by+bh-14, barW=bw-32, barH=6;
  noStroke();fill(40,30,50);rect(barX,barY,barW,barH);
  fill(cr,cg,cb,180);rect(barX,barY,int(barW*prog),barH);
  noFill();stroke(cr,cg,cb,80);strokeWeight(1);rect(barX,barY,barW,barH);noStroke();

  // Bottom prompt
  pixelBox(W/2-140,by+bh+10,280,26,[80,70,60],DARK);
  if(int(T/30)%2===0){
    fill(160,150,120);textSize(6);textAlign(CENTER);
    text('RAISE YOUR HANDS TO BEGIN',W/2,by+bh+27);
  }
}

function updateTutorial(){
  const anyOn = hs[0].on || hs[1].on;
  if(anyOn){ lastHandSeen=frameCount; tutorialActive=false; }
  if(!tutorialActive&&!anyOn&&frameCount-lastHandSeen>TUTORIAL_DELAY){
    tutorialActive=true; tutorialCard=0; tutorialTimer=frameCount;
  }
  if(tutorialActive&&frameCount-tutorialTimer>=TUTORIAL_CARD_DUR){
    tutorialCard=(tutorialCard+1)%TUTORIAL_CARDS.length;
    tutorialTimer=frameCount;
  }
}

// ── Send state ────────────────────────────────────────────────
function sendState(){
  if(!ws||ws.readyState!==WebSocket.OPEN) return;
  const now=millis();
  if(now-lastStateSend<500) return;
  lastStateSend=now;
  let totalSpd=0;
  for(let i=0;i<N;i++) totalSpd+=abs(pvx[i])+abs(pvy[i]);
  let palmDist=0;
  if(hs[0].on&&hs[1].on){const dx=hs[1].px-hs[0].px,dy=hs[1].py-hs[0].py;palmDist=sqrt(dx*dx+dy*dy);}
  ws.send(JSON.stringify({type:'state',state:{
    hands:(hs[0].on?1:0)+(hs[1].on?1:0),
    gestures:[hs[0].on?hs[0].g:'',hs[1].on?hs[1].g:''].filter(Boolean),
    score,best,zone:activeZone,
    comboName:comboFlash.timer>0?comboFlash.name:'',
    avgSpeed:N?(totalSpd/N)*2.5:0,palmDist
  }}));
}

// ── Draw ──────────────────────────────────────────────────────
function draw(){
  if(P.trail){noStroke();fill(13,8,32,38);rect(0,0,W,H);}
  else background(13,8,32);

  if(flashAlpha>0){
    const tgt=ZONE_RGB[activeZone]||ZONE_RGB.void;
    noStroke();fill(tgt.r,tgt.g,tgt.b,flashAlpha);rect(0,0,W,H);
    flashAlpha=max(0,flashAlpha-2);
  }

  updateHands();
  updateTutorial();

  // Classify zone every 2 seconds
  if(frameCount%120===0) classifyZone();

  checkCombos();
  applyForces();
  stepPts();
  drawPts();
  drawConvergenceLine();
  drawHand(hs[0],zoneHandCol);
  drawHand(hs[1],zoneHandCol);

  score=hs[0].held+hs[1].held;
  best=max(best,score);

  drawHUD();
  drawComboCharge();
  drawComboFlash();
  if(tutorialActive) drawTutorial();
  sendState();
}
</script>
