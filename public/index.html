<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQUISH</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; background:#000;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  canvas {
    display:block;
    max-width:100vw; max-height:100vh;
    width:auto !important; height:auto !important;
    aspect-ratio:640/480;
  }
  /* Narration overlay — sits over canvas, centred bottom */
  #narration {
    position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
    font-family:monospace; font-size:14px; letter-spacing:0.12em;
    color:#fff; text-align:center; pointer-events:none;
    white-space:nowrap;
    opacity:0; transition:opacity 0.8s ease;
    text-shadow: 0 0 0 #000, 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  }
  #narration.show { opacity:1; }
</style>
</head>
<body>
<div id="narration"></div>
<script>
// ─────────────────────────────────────────────────────────────
//  SQUISH — installation display
//  Physics params arrive via WebSocket from phone controller.
//  AI narration lines arrive from server (Ollama).
// ─────────────────────────────────────────────────────────────

const W = 640, H = 480;

let handPose, video;
let hands = [];
let ready = false;

// Physics params — defaults, overwritten by server
let P = {
  count:    350,
  gravity:  0.02,
  friction: 0.993,
  radius:   110,
  attract:  3.5,
  repel:    7.0,
  size:     4,
  trail:    true
};

// Particles
let pts = [];

// Hand state
let hs = [newHand(), newHand()];
let score = 0, best = 0;

// State send throttle
let lastStateSend = 0;

function newHand() {
  return { on:false, kp:[], px:0,py:0, ppx:0,ppy:0, vx:0,vy:0, spd:0, g:'open', pg:'open', held:0, flickCd:0 };
}

// ── WebSocket ─────────────────────────────────────────────────
let ws;
function connectWS() {
  ws = new WebSocket('ws://localhost:3000');
  ws.onopen    = () => ws.send(JSON.stringify({ type:'identify', role:'display' }));
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'params') {
      P = { ...P, ...msg.params };
      // Respawn if count changed significantly
      if (Math.abs(pts.length - P.count) > 30) spawnParticles();
    }
    if (msg.type === 'narration') showNarration(msg.text);
    if (msg.type === 'reset')     { spawnParticles(); best=0; score=0; }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}
connectWS();

// ── Narration display ─────────────────────────────────────────
let narTimer;
function showNarration(text) {
  const el = document.getElementById('narration');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(narTimer);
  narTimer = setTimeout(() => el.classList.remove('show'), 5000);
}

// ── ml5 preload ───────────────────────────────────────────────
function preload() {
  handPose = ml5.handPose({ flipped:true, maxHands:2 });
}

function setup() {
  createCanvas(W, H);
  video = createCapture(VIDEO);
  video.size(W, H);
  video.hide();
  handPose.detectStart(video, (r) => { hands=r; ready=true; });
  spawnParticles();
  textFont('monospace');
  noSmooth();
}

function spawnParticles() {
  pts = [];
  for (let i=0; i<P.count; i++) {
    pts.push({ x:random(W), y:random(H), vx:random(-1.5,1.5), vy:random(-1.5,1.5), r:P.size * random(0.6,1.2) });
  }
}

// ── Gesture classifier ────────────────────────────────────────
function gesture(kp, spd) {
  if (!kp || kp.length < 21) return 'open';
  if (spd > 18) return 'flick';
  const up = (t,p) => kp[t].y < kp[p].y - 8;
  const dn = (t,m) => kp[t].y >= kp[m].y - 10;
  const iUp=up(8,6),mUp=up(12,10),rUp=up(16,14),pUp=up(20,18);
  const iDn=dn(8,5),mDn=dn(12,9), rDn=dn(16,13),pDn=dn(20,17);
  if (iDn&&mDn&&rDn&&pDn) return 'fist';
  if (iUp&&mUp&&rUp&&pUp) return abs(kp[8].x-kp[20].x)>60 ? 'spread' : 'open';
  return 'open';
}

// ── Update hands ──────────────────────────────────────────────
const SM = 0.4;
function updateHands() {
  for (const h of hs) { h.on=false; h.held=0; }
  for (let i=0; i<min(hands.length,2); i++) {
    const raw=hands[i];
    if (!raw||!raw.keypoints||raw.keypoints.length<21) continue;
    const h=hs[i]; h.ppx=h.px; h.ppy=h.py; h.on=true;
    if (h.kp.length<21) { h.kp=raw.keypoints.map(k=>({x:k.x,y:k.y})); }
    else { for (let k=0;k<21;k++) { h.kp[k].x=lerp(h.kp[k].x,raw.keypoints[k].x,SM); h.kp[k].y=lerp(h.kp[k].y,raw.keypoints[k].y,SM); } }
    h.px=(h.kp[0].x+h.kp[5].x+h.kp[9].x+h.kp[13].x+h.kp[17].x)/5;
    h.py=(h.kp[0].y+h.kp[5].y+h.kp[9].y+h.kp[13].y+h.kp[17].y)/5;
    h.vx=h.px-h.ppx; h.vy=h.py-h.ppy;
    h.spd=sqrt(h.vx*h.vx+h.vy*h.vy);
    h.pg=h.g; h.g=gesture(h.kp,h.spd);
    if (h.g==='flick'&&h.pg!=='flick') h.flickCd=18;
    if (h.flickCd>0) h.flickCd--;
  }
}

// ── Apply forces ──────────────────────────────────────────────
function applyForces() {
  const R=P.radius;
  for (const h of hs) {
    if (!h.on) continue;
    let held=0;
    for (const p of pts) {
      const dx=h.px-p.x, dy=h.py-p.y, d=sqrt(dx*dx+dy*dy);
      if (d>R*2.2||d<0.5) continue;
      const n=d/R;
      if (h.g==='fist') {
        const f=P.attract/(n*n+0.3);
        p.vx+=(dx/d)*f*0.10; p.vy+=(dy/d)*f*0.10;
        p.vx*=0.88; p.vy*=0.88;
        if (d<R*0.5) held++;
      } else if (h.g==='open') {
        if (d<R) { p.vx+=(dx/d)*0.8*(1-n)*0.07; p.vy+=(dy/d)*0.8*(1-n)*0.07; p.vx*=0.94; p.vy*=0.94; held++; }
      } else if (h.g==='spread') {
        const f=P.repel*max(0,1-n);
        p.vx-=(dx/d)*f*0.18; p.vy-=(dy/d)*f*0.18;
      } else if (h.g==='flick'&&h.flickCd>0) {
        if (d<R*1.6) { p.vx+=h.vx*0.20; p.vy+=h.vy*0.20; }
      }
    }
    h.held=held;
  }
}

// ── Step particles ────────────────────────────────────────────
function stepPts() {
  for (const p of pts) {
    p.vy+=P.gravity; p.vx*=P.friction; p.vy*=P.friction;
    p.x+=p.vx; p.y+=p.vy;
    if (p.x<p.r)     { p.x=p.r;     p.vx*=-0.7; }
    if (p.x>W-p.r)   { p.x=W-p.r;   p.vx*=-0.7; }
    if (p.y<p.r)     { p.y=p.r;     p.vy*=-0.7; }
    if (p.y>H-p.r)   { p.y=H-p.r;   p.vy*=-0.7; }
  }
}

// ── Draw particles ────────────────────────────────────────────
function drawPts() {
  noStroke();
  for (const p of pts) {
    const v=sqrt(p.vx*p.vx+p.vy*p.vy);
    const b=int(map(v,0,10,120,255));
    fill(b); circle(p.x,p.y,p.r*2);
  }
}

// ── Draw hand skeleton ────────────────────────────────────────
const BONES=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];

function drawHand(h, col) {
  if (!h.on||h.kp.length<21) return;
  const sq=h.g==='fist', sp=h.g==='spread';
  const R=P.radius;
  stroke(col); noFill(); strokeWeight(sq?2.5:1);
  drawingContext.setLineDash(sq?[]:[4,7]);
  circle(h.px,h.py,R*2);
  drawingContext.setLineDash([]);
  if (sq) { fill(col+'18'); noStroke(); circle(h.px,h.py,R*2); }
  if (sp) { noFill(); stroke(col); strokeWeight(1); circle(h.px,h.py,R*3); strokeWeight(0.5); circle(h.px,h.py,R*4.2); }
  stroke(col); strokeWeight(sq?2:1.3); noFill();
  for (const [a,b] of BONES) line(h.kp[a].x,h.kp[a].y,h.kp[b].x,h.kp[b].y);
  noStroke(); fill(col);
  for (let k=0;k<21;k++) { const tip=[4,8,12,16,20].includes(k); circle(h.kp[k].x,h.kp[k].y,tip?(sq?12:8):5); }
  noStroke(); fill(col); textSize(10); textAlign(CENTER);
  text(h.g.toUpperCase(),h.kp[0].x,h.kp[0].y-14);
}

// ── Score HUD ─────────────────────────────────────────────────
function drawHUD() {
  // Score — top left
  noStroke(); fill(0); rect(0,0,130,58);
  stroke(255); strokeWeight(2); noFill(); rect(0,0,130,58);
  noStroke(); fill(255); textAlign(LEFT);
  textSize(9);  text('HELD', 10, 16);
  textSize(34); text(score, 10, 52);
  noStroke(); fill(90); textSize(8); text('BEST: '+best, 10, 70);

  // Hand badges — top right
  for (let i=0;i<2;i++) {
    const h=hs[i], bx=W-118+i*60;
    noStroke(); fill(0); rect(bx,0,56,44);
    stroke(h.on?255:35); strokeWeight(h.on?2:1); noFill(); rect(bx,0,56,44);
    noStroke(); fill(h.on?255:45); textSize(8); textAlign(CENTER);
    text('H'+(i+1), bx+28, 13);
    textSize(8); text(h.on?h.g.toUpperCase():'--', bx+28, 26);
    textSize(8); fill(180); text(h.on?h.held+'p':'', bx+28, 40);
  }

  // Legend — bottom left
  noStroke(); fill(0); rect(0,H-58,178,58);
  stroke(255); strokeWeight(1); noFill(); rect(0,H-58,178,58);
  noStroke(); fill(180); textSize(8); textAlign(LEFT);
  text('FIST   attract', 8, H-46);
  text('OPEN   hold',    8, H-35);
  text('SPREAD repel',   8, H-24);
  text('FLICK  shockwave',8,H-13);

  // Loading overlay
  if (!ready) {
    fill(0,210); noStroke(); rect(0,0,W,H);
    fill(255); textSize(13); textAlign(CENTER);
    text('loading handpose...', W/2, H/2);
    fill(120); textSize(9);
    text('allow camera access', W/2, H/2+18);
  }
}

// ── Send state to server ──────────────────────────────────────
function sendState() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const now = millis();
  if (now - lastStateSend < 500) return;  // max 2/s
  lastStateSend = now;

  const activeHands = hs.filter(h=>h.on);
  const gestures    = activeHands.map(h=>h.g);
  let   totalSpd    = 0;
  for (const p of pts) totalSpd += sqrt(p.vx*p.vx+p.vy*p.vy);

  ws.send(JSON.stringify({ type:'state', state:{
    hands:   activeHands.length,
    gestures,
    score,
    best,
    avgSpeed: pts.length ? totalSpd/pts.length : 0
  }}));
}

// ── Main draw ─────────────────────────────────────────────────
function draw() {
  if (P.trail) { noStroke(); fill(0,45); rect(0,0,W,H); }
  else         background(0);

  updateHands();
  applyForces();
  stepPts();
  drawPts();
  drawHand(hs[0],'#ffffff');
  drawHand(hs[1],'#aaaaaa');

  score = hs[0].held + hs[1].held;
  best  = max(best, score);

  drawHUD();
  sendState();
}
</script>
</body>
</html>
