<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SQUISH — Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #1a1025;
    --card:  #221432;
    --fg:    #e8d5a3;
    --dim:   #a08860;
    --bdr:   #4a3a20;
    --acc:   #e8d5a3;
    --hi:    #ffe8b0;
    --shadow:#0d0820;

    --zone-stillness:   #7ab4e8;
    --zone-surge:       #e8786a;
    --zone-convergence: #c09ae8;
    --zone-void:        #a09ab0;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; image-rendering:pixelated; }

  html, body {
    width:100%; min-height:100vh;
    background:var(--bg); color:var(--fg);
    font-family:'Press Start 2P', monospace;
    font-size:8px; line-height:1.8;
    overscroll-behavior:none;
  }

  /* CRT scanline */
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(
      0deg,transparent,transparent 2px,
      rgba(0,0,0,0.10) 2px,rgba(0,0,0,0.10) 4px
    );
    pointer-events:none; z-index:999;
  }

  /* PS1 pixel box mixin — used everywhere */
  .px-box {
    background:var(--card);
    border:2px solid var(--fg);
    box-shadow:inset 0 0 0 1px var(--bdr), 3px 3px 0 var(--shadow);
    position:relative;
  }

  /* Header */
  header {
    position:sticky; top:0; z-index:10;
    background:var(--bg);
    border-bottom:2px solid var(--fg);
    box-shadow:0 2px 0 var(--shadow);
    padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo {
    font-size:14px; letter-spacing:2px; color:var(--hi);
    text-shadow:2px 2px 0 var(--shadow);
  }
  .logo span { color:var(--dim); font-size:10px; display:block; margin-top:2px; letter-spacing:1px; }
  .conn {
    font-size:6px; letter-spacing:1px;
    padding:5px 10px;
    background:var(--card);
    border:2px solid var(--bdr);
    box-shadow:2px 2px 0 var(--shadow);
    color:var(--dim);
    transition:color 0.2s, border-color 0.2s;
  }
  .conn.live { color:#7ae8a0; border-color:#3a7a50; }

  /* Zone box */
  #zone-box {
    margin:12px; padding:14px;
    transition:border-color 0.4s;
  }
  .zone-box-label {
    font-size:6px; letter-spacing:2px;
    color:var(--dim); margin-bottom:8px;
  }
  #zone-name {
    font-size:14px; letter-spacing:1px;
    color:var(--zone-void);
    transition:color 0.4s;
    text-shadow:2px 2px 0 var(--shadow);
    line-height:1.4;
  }
  #zone-desc-ctrl {
    font-size:6px; color:var(--dim);
    margin-top:6px; line-height:1.8;
  }
  #zone-rule {
    margin-top:8px; font-size:7px;
    padding:8px 10px; line-height:1.6;
    background:var(--bg);
    border:2px solid var(--bdr);
    box-shadow:2px 2px 0 var(--shadow);
    color:var(--fg);
  }

  /* Metrics */
  #metrics {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:8px; margin:0 12px 12px;
  }
  .metric {
    padding:10px 6px; text-align:center;
  }
  .metric-val {
    font-size:20px; display:block;
    color:var(--hi); line-height:1.2;
    text-shadow:2px 2px 0 var(--shadow);
  }
  .metric-key {
    font-size:5px; letter-spacing:1px;
    color:var(--dim); margin-top:4px; display:block;
  }

  /* Sections */
  section {
    margin:0 12px 10px; padding:14px;
  }
  .section-title {
    font-size:6px; letter-spacing:2px;
    color:var(--dim); margin-bottom:12px;
    padding-bottom:6px;
    border-bottom:1px solid var(--bdr);
  }

  /* Sliders */
  .slider-wrap { margin-bottom:14px; }
  .row { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .row-label { font-size:7px; letter-spacing:0px; flex:1; line-height:1.4; }
  .row-val { font-size:8px; min-width:44px; text-align:right; color:var(--hi); }

  input[type=range] {
    -webkit-appearance:none; appearance:none;
    width:100%; height:8px; margin-top:4px;
    background:var(--bg);
    border:2px solid var(--bdr);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none;
    width:20px; height:20px;
    background:var(--fg);
    border:2px solid var(--hi);
    box-shadow:2px 2px 0 var(--shadow);
    cursor:pointer;
    /* Square thumb — PS1 style */
    border-radius:0;
  }
  input[type=range]:active::-webkit-slider-thumb {
    transform:translate(1px,1px);
    box-shadow:1px 1px 0 var(--shadow);
  }

  /* Toggle */
  .tog-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .tog-btn {
    font-family:'Press Start 2P', monospace;
    font-size:7px; letter-spacing:1px;
    padding:7px 14px;
    background:var(--card); color:var(--dim);
    border:2px solid var(--bdr);
    box-shadow:3px 3px 0 var(--shadow);
    cursor:pointer; transition:all 0.08s;
  }
  .tog-btn.on {
    background:var(--fg); color:var(--shadow);
    border-color:var(--hi);
    box-shadow:3px 3px 0 var(--shadow);
  }
  .tog-btn:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--shadow); }

  /* Action buttons */
  .btn-row { display:flex; gap:8px; }
  .btn {
    flex:1;
    font-family:'Press Start 2P', monospace;
    font-size:7px; letter-spacing:0px;
    padding:12px 4px;
    background:var(--card); color:var(--fg);
    border:2px solid var(--bdr);
    box-shadow:3px 3px 0 var(--shadow);
    cursor:pointer; text-transform:uppercase;
    text-align:center; transition:all 0.08s;
    line-height:1.4;
  }
  .btn:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--shadow); }
  .btn.primary {
    background:var(--fg); color:var(--shadow);
    border-color:var(--hi);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--bdr); }
</style>
</head>
<body>

<header>
  <div class="logo">SQUISH<span>CONTROL PAD</span></div>
  <div class="conn" id="conn-status">• OFFLINE</div>
</header>

<!-- Zone display -->
<div id="zone-box" class="px-box">
  <div class="zone-box-label">&gt; ACTIVE ZONE</div>
  <div id="zone-name">VOID</div>
  <div id="zone-desc-ctrl">no presence detected</div>
  <div id="zone-rule">field acting alone</div>
</div>

<!-- Combo display -->
<div id="combo-box" class="px-box" style="margin:0 12px 12px;padding:12px 14px;">
  <div class="zone-box-label">&gt; LAST COMBO</div>
  <div id="combo-name" style="font-size:11px;letter-spacing:1px;color:var(--dim);">none yet</div>
</div>

<!-- Live metrics -->
<div id="metrics">
  <div class="metric px-box">
    <span class="metric-val" id="m-hands">0</span>
    <span class="metric-key">HANDS</span>
  </div>
  <div class="metric px-box">
    <span class="metric-val" id="m-score">0</span>
    <span class="metric-key">HELD</span>
  </div>
  <div class="metric px-box">
    <span class="metric-val" id="m-speed">0</span>
    <span class="metric-key">SPD</span>
  </div>
</div>

<!-- Physics controls -->
<section class="px-box">
  <div class="section-title">&gt;&gt; PARTICLES</div>
  <div class="slider-wrap">
    <div class="row"><div class="row-label">COUNT</div><div class="row-val" id="v-count">200</div></div>
    <input type="range" id="s-count" min="50" max="600" step="10" value="200"
      oninput="update('count',+this.value,'v-count')">
  </div>
  <div class="slider-wrap">
    <div class="row"><div class="row-label">SIZE</div><div class="row-val" id="v-size">4</div></div>
    <input type="range" id="s-size" min="1" max="10" step="0.5" value="4"
      oninput="update('size',+this.value,'v-size')">
  </div>
</section>

<section class="px-box">
  <div class="section-title">&gt;&gt; PHYSICS</div>
  <div class="slider-wrap">
    <div class="row"><div class="row-label">GRAVITY</div><div class="row-val" id="v-gravity">0.02</div></div>
    <input type="range" id="s-gravity" min="-0.15" max="0.15" step="0.005" value="0.02"
      oninput="update('gravity',+this.value,'v-gravity',3)">
  </div>
  <div class="slider-wrap">
    <div class="row"><div class="row-label">FRICTION</div><div class="row-val" id="v-friction">0.993</div></div>
    <input type="range" id="s-friction" min="0.92" max="1.0" step="0.001" value="0.993"
      oninput="update('friction',+this.value,'v-friction',3)">
  </div>
  <div class="slider-wrap">
    <div class="row"><div class="row-label">BOUNCE</div><div class="row-val" id="v-bounce">0.7</div></div>
    <input type="range" id="s-bounce" min="0.1" max="1.0" step="0.05" value="0.7"
      oninput="update('bounce',+this.value,'v-bounce',2)">
  </div>
</section>

<section class="px-box">
  <div class="section-title">&gt;&gt; HAND FORCES</div>
  <div class="slider-wrap">
    <div class="row"><div class="row-label">RADIUS</div><div class="row-val" id="v-radius">110</div></div>
    <input type="range" id="s-radius" min="40" max="220" step="5" value="110"
      oninput="update('radius',+this.value,'v-radius')">
  </div>
  <div class="slider-wrap">
    <div class="row"><div class="row-label">ATTRACT</div><div class="row-val" id="v-attract">3.5</div></div>
    <input type="range" id="s-attract" min="0.5" max="10" step="0.5" value="3.5"
      oninput="update('attract',+this.value,'v-attract',1)">
  </div>
  <div class="slider-wrap">
    <div class="row"><div class="row-label">REPEL</div><div class="row-val" id="v-repel">7.0</div></div>
    <input type="range" id="s-repel" min="1" max="16" step="0.5" value="7.0"
      oninput="update('repel',+this.value,'v-repel',1)">
  </div>
</section>

<section class="px-box">
  <div class="section-title">&gt;&gt; VISUALS</div>
  <div class="tog-row">
    <div class="row-label">MOTION TRAIL</div>
    <button class="tog-btn on" id="tog-trail" onclick="toggleTrail(this)">ON</button>
  </div>
</section>

<section class="px-box">
  <div class="section-title">&gt;&gt; ACTIONS</div>
  <div class="btn-row">
    <button class="btn primary" onclick="send({type:'reset'})">RESET</button>
    <button class="btn" onclick="send({type:'reset'})">CLR BEST</button>
  </div>
</section>

<div style="height:32px"></div>

<script>
const ZONE_COLS = {
  stillness:   '#7ab4e8',
  surge:       '#e8786a',
  convergence: '#c09ae8',
  void:        '#a09ab0'
};
const ZONE_RULES = {
  stillness:   'FIST DISABLED\nHOLD STILL ONLY',
  surge:       'REPEL x2\nSCATTER FREELY',
  convergence: 'STAY WITHIN\n220px OF PARTNER',
  void:        'FIELD ACTING ALONE\nNO HANDS DETECTED'
};

let ws;
function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host);
  ws.onopen=()=>{
    ws.send(JSON.stringify({type:'identify',role:'control'}));
    setConn(true);
  };
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='params'){
      const p=msg.params;
      syncSlider('s-count',   'v-count',   p.count,    0);
      syncSlider('s-size',    'v-size',    p.size,     1);
      syncSlider('s-gravity', 'v-gravity', p.gravity,  3);
      syncSlider('s-friction','v-friction',p.friction, 3);
      syncSlider('s-radius',  'v-radius',  p.radius,   0);
      syncSlider('s-attract', 'v-attract', p.attract,  1);
      syncSlider('s-repel',   'v-repel',   p.repel,    1);
      const tb=document.getElementById('tog-trail');
      tb.textContent=p.trail?'ON':'OFF';
      tb.classList.toggle('on',p.trail);
    }
    if(msg.type==='state'){
      const s=msg.state;
      document.getElementById('m-hands').textContent=s.hands||0;
      document.getElementById('m-score').textContent=s.score||0;
      document.getElementById('m-speed').textContent=(s.avgSpeed||0).toFixed(1);
      // Zone from state
      if(s.zone){
        const col=ZONE_COLS[s.zone]||'#a09ab0';
        const rule=ZONE_RULES[s.zone]||'';
        document.getElementById('zone-name').textContent=s.zone.toUpperCase();
        document.getElementById('zone-name').style.color=col;
        document.getElementById('zone-rule').textContent=rule;
        document.getElementById('zone-box').style.borderColor=col;
      }
      // Combo name
      if(s.comboName){
        const cn=document.getElementById('combo-name');
        cn.textContent=s.comboName;
        cn.style.color='#ffe89a';
      }
    }
  };
  ws.onclose=()=>{setConn(false);setTimeout(connect,2000);};
}

function setConn(on){
  const el=document.getElementById('conn-status');
  el.textContent=on?'• LIVE':'• OFFLINE';
  el.classList.toggle('live',on);
}

function update(key,value,labelId,decimals=0){
  document.getElementById(labelId).textContent=decimals>0?value.toFixed(decimals):value;
  send({type:'setParam',key,value});
}

function send(msg){
  if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

function syncSlider(sId,lId,value,decimals){
  const s=document.getElementById(sId),l=document.getElementById(lId);
  if(!s||!l) return;
  s.value=value;
  l.textContent=decimals>0?(+value).toFixed(decimals):value;
}

function toggleTrail(btn){
  const on=btn.classList.toggle('on');
  btn.textContent=on?'ON':'OFF';
  send({type:'setParam',key:'trail',value:on});
}

connect();
</script>
</body>
</html>
